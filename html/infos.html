<div id="skills-order">
    <div id="jhin-skills-order-title"><h2>Skills Order</h2></div>
        <table id="skills-order-table">
            <tr>
                <td> R <img alt="jhin's R" src="../imgs/JhinR.png"></td>

<!-- FORM START -->
    <div id="random-form">
        <h2>Random form ;D</h2>
        <form>
            <label for="username">Username</label><br>
            <input type="text" id="username" name="username" value="">
            <br>
            <label for="email">Email</label><br>
            <input type="email" id="email" name="email" value="">
            <br>
            <label for="mastery-points">Mastery points:</label><br>
            <input type="number" id="mastery-points" name="mastery-points" min="0" max="70000">
            <br>
            <label for="elo">Elo</label><br>
            <select id="elo" name="elo">
                <option value="bronze">Bronze</option>
                <option value="silver">Silver</option>
                <option value="gold">Gold</option>
                <option value="platinium">Platinium</option>
                <option value="diamond">Diamond</option>
                <option value="master">Master</option>
                <option value="grandmaster">Grand-Master</option>
                <option value="challenger">Challenger</option>
            </select>
            <br>
            <input type="submit">
        </form>
    </div>
